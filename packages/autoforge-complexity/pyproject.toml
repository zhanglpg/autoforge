[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoforge-complexity"
version = "0.1.0"
description = "Complexity metric adapter for AutoForge (NCS via complexity-accounting)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
keywords = ["autoforge", "complexity", "metrics", "code-quality"]
dependencies = [
    "open-autoforge>=0.1.1",
    "complexity-accounting>=1.6.0",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[project.entry-points."autoforge.adapters"]
complexity = "autoforge_complexity:ComplexityAdapter"

[project.urls]
Homepage = "https://github.com/zhanglpg/autoforge"
Repository = "https://github.com/zhanglpg/autoforge"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
