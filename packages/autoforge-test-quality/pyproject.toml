[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoforge-test-quality"
version = "0.1.0"
description = "Test quality metric adapter for AutoForge (coverage, assertion quality, mutation testing)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
keywords = ["autoforge", "test-quality", "coverage", "mutation-testing", "metrics"]
dependencies = [
    "open-autoforge>=0.1.1",
    "pytest",
    "coverage>=4.0",
]

[project.optional-dependencies]
mutation = ["mutmut"]
test = ["pytest>=7.0"]

[project.entry-points."autoforge.adapters"]
test_quality = "autoforge_test_quality:TestQualityAdapter"

[project.urls]
Homepage = "https://github.com/zhanglpg/autoforge"
Repository = "https://github.com/zhanglpg/autoforge"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
