[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autoforge-type-safety"
version = "0.1.0"
description = "Type safety metric adapter for AutoForge (pyright/mypy type error count)"
requires-python = ">=3.10"
license = {text = "MIT"}
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
keywords = ["autoforge", "type-safety", "pyright", "mypy", "metrics"]
dependencies = [
    "open-autoforge>=0.1.1",
]

[project.optional-dependencies]
test = ["pytest>=7.0"]

[project.entry-points."autoforge.adapters"]
type_safety = "autoforge_type_safety:TypeSafetyAdapter"

[project.urls]
Homepage = "https://github.com/zhanglpg/autoforge"
Repository = "https://github.com/zhanglpg/autoforge"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
