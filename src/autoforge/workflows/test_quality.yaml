# AutoForge Workflow: Test Quality Improvement
#
# Uses AST analysis and coverage measurement to compute a Test Quality Score
# (TQS) and iteratively improves test suites. Combines coverage, function
# gap analysis, assertion quality, and optional mutation testing.

name: test_quality
version: "1.0"
description: "Improve test suite quality through iterative test generation and enhancement"
adapter: test_quality

language_support:
  python:
    metric_tool: pytest-cov
    metric_command: "python -m pytest --cov={target_path} --cov-report=json --cov-branch"
    metric_parser: "coverage_json"

primary_metric:
  name: test_quality_score
  direction: maximize
  default_target: 80.0

constraint_metrics:
  - name: test_suite_pass
    tolerance_percent: 0
    direction: maximize

budget:
  max_iterations: 15
  max_tokens: 500000
  max_wall_clock_minutes: 45
  stall_patience: 3
  min_improvement_percent: 2.0
  max_files_per_iteration: 5

scope:
  priority: worst_first

agent:
  command: "claude"  # Agent binary to invoke (default: claude)
  skill: "improve-test-quality"
  system_prompt_addendum: |
    You are improving test quality. For each target file:
    1. If no tests exist, write comprehensive tests covering all public functions
    2. Focus on STRONG assertions (assertEqual, assertRaises, specific value checks)
    3. Each test should have 2-4 strong assertions — quality matters more than quantity
    4. Additional assertions beyond 4 per test have diminishing returns on the score
    5. Avoid weak assertions (assertTrue, assertIsNone) as primary checks —
       they contribute little to the quality score and dilute the strength ratio
    6. Do NOT pad tests with extra assertions; adding low-value assertions hurts the score
    7. Cover edge cases, error paths, and boundary values
    8. Prefer testing behavior over implementation details
    9. Name tests descriptively to reflect the behavior they verify
